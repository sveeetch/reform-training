<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101418">
    <title>Reform Training</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Онлайн-дневник тренировок</p>
          <h1>Reform Training</h1>
        </div>
        <div class="sync-pill" id="syncStatus">Подключение</div>
      </header>

      <section class="hero">
        <div>
          <p class="hero-kicker">Сегодня</p>
          <h2 id="todayTitle">Fullbody 1</h2>
          <p id="todayMeta">Общий журнал для тренировок.</p>
        </div>
        <div class="hero-actions">
          <div class="user-picker">
            <label class="field compact">
              <span>Пользователь</span>
              <div class="select-inline">
                <select id="userSelect"></select>
                <button class="icon-btn" id="editUserBtn" type="button" aria-label="Редактировать пользователя" title="Редактировать">✎</button>
              </div>
            </label>
          </div>
          <button class="primary" id="startSessionBtn" type="button">Начать тренировку</button>
        </div>
      </section>

      <nav class="tabs" aria-label="Main views">
        <button class="tab active" data-view="workout" type="button">Тренировка</button>
        <button class="tab" data-view="history" type="button">История</button>
        <button class="tab" data-view="progress" type="button">Прогресс</button>
        <button class="tab" data-view="settings" type="button">Программа</button>
      </nav>

      <section class="layout">
        <aside class="sidebar">
          <div class="panel">
            <div class="panel-head">
              <h3>День тренировки</h3>
            </div>
            <div class="day-switch" id="daySwitch"></div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h3>Сессия</h3>
            </div>
            <div class="session-card">
              <div>
                <span class="muted">Статус</span>
                <strong id="sessionState">Не начата</strong>
              </div>
              <button class="ghost danger" id="skipDayBtn" type="button">Пропустить</button>
            </div>
          </div>
        </aside>

        <section class="content">
          <section class="view active" id="workoutView">
            <div class="toolbar">
              <h3>Упражнения</h3>
              <button class="ghost" id="addExerciseBtn" type="button">Добавить</button>
            </div>
            <div class="exercise-list" id="exerciseList"></div>
          </section>

          <section class="view" id="historyView">
            <div class="toolbar">
              <h3>Общая история</h3>
              <button class="ghost" id="refreshBtn" type="button">Обновить</button>
            </div>
            <div class="history-list" id="historyList"></div>
          </section>

          <section class="view" id="progressView">
            <div class="toolbar">
              <h3>Прогресс</h3>
              <select id="progressExercise"></select>
            </div>
            <div class="chart-card">
              <canvas id="progressChart" width="900" height="360"></canvas>
            </div>
            <div class="stats-grid" id="statsGrid"></div>
          </section>

          <section class="view" id="settingsView">
            <div class="toolbar">
              <h3>Редактор программы</h3>
              <div class="toolbar-actions">
                <button class="ghost" id="addDayBtn" type="button">Добавить день</button>
                <button class="ghost" id="resetProgramBtn" type="button">Сбросить программу</button>
              </div>
            </div>
            <div class="editor-list" id="programEditor"></div>
          </section>
        </section>
      </section>
    </main>

    <dialog id="exerciseDialog">
      <form method="dialog" class="modal">
        <h3 id="dialogTitle">Упражнение</h3>
        <label class="field">
          <span>Название</span>
          <input id="exerciseName" required>
        </label>
        <label class="field">
          <span>Тренажер / заметка</span>
          <input id="exerciseMachine">
        </label>
        <label class="field">
          <span>Категория</span>
          <select id="exerciseCategory">
            <option value="chest">Грудь (Chest)</option>
            <option value="back">Спина (Back)</option>
            <option value="shoulders">Плечи (Shoulders)</option>
            <option value="arms">Руки (Arms)</option>
            <option value="legs">Ноги (Legs)</option>
            <option value="calves">Икры (Calves)</option>
            <option value="glutes">Ягодицы (Glutes)</option>
            <option value="core">Кор (Core)</option>
          </select>
        </label>
        <div class="modal-actions">
          <button class="ghost" value="cancel" type="submit">Отмена</button>
          <button class="primary" id="saveExerciseBtn" value="default" type="button">Сохранить</button>
        </div>
      </form>
    </dialog>

    <dialog id="userDialog">
      <form method="dialog" class="modal">
        <h3>Пользователь</h3>
        <label class="field">
          <span>Имя</span>
          <input id="userNameInput" placeholder="Имя пользователя">
        </label>
        <div class="modal-actions spread">
          <button class="ghost" id="addGuestBtn" type="button">Добавить гостя</button>
          <button class="ghost danger" id="deleteUserBtn" type="button">Удалить</button>
        </div>
        <div class="modal-actions">
          <button class="ghost" value="cancel" type="submit">Отмена</button>
          <button class="primary" id="renameUserBtn" type="button">Сохранить</button>
        </div>
      </form>
    </dialog>

    <dialog id="confirmDialog">
      <form method="dialog" class="modal confirm-modal">
        <h3 id="confirmTitle">Подтвердить действие</h3>
        <p id="confirmText" class="confirm-text"></p>
        <div class="modal-actions">
          <button class="ghost" id="confirmCancelBtn" value="cancel" type="button">Отмена</button>
          <button class="primary danger-fill" id="confirmOkBtn" value="default" type="button">Подтвердить</button>
        </div>
      </form>
    </dialog>

    <dialog id="mediaDialog">
      <form method="dialog" class="modal media-modal">
        <div class="panel-head">
          <h3 id="mediaTitle">Фото упражнения</h3>
          <button class="ghost" value="cancel" type="submit">Закрыть</button>
        </div>
        <div class="media-frame">
          <img id="mediaImage" alt="">
        </div>
        <p class="muted" id="mediaHint"></p>
        <div class="media-links">
          <a class="ghost" id="mediaImageLink" target="_blank" rel="noreferrer">Google Images</a>
          <a class="ghost" id="mediaVideoLink" target="_blank" rel="noreferrer">YouTube</a>
        </div>
      </form>
    </dialog>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
